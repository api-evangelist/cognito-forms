name: Cognito Forms
description: Cognito Forms is an online form builder with a REST API for managing
  forms, retrieving entries, updating submissions, and integrating form data into
  business applications. The API uses API key bearer token authentication and supports
  operations for forms, entries, and documents, with OData support for analytics
  tool integration.
