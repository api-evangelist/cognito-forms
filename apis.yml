apis:
  - name: Cognito Forms REST API
    description: REST API for secure access to forms, entries, and documents within
      Cognito Forms. Supports creating, reading, updating, and deleting form entries,
      managing form availability, and retrieving form schemas. Also provides an OData
      service for syncing entry data with analytics tools like Power BI, Tableau,
      and Excel.
